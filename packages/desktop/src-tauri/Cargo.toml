[package]
name = "archon-desktop"
version = "0.1.0"
description = "Archon Desktop — cross-platform Tauri v2 app"
authors = ["Staxed"]
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "archon_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["net", "time", "process", "io-util"] }
portable-pty = "0.8"
base64 = "0.22"
uuid = { version = "1", features = ["v4"] }
