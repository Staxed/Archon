name: archon-workflow-builder
description: |
  Use when: User wants to create a new custom workflow for their project.
  Triggers: "build me a workflow", "create a workflow", "generate a workflow",
            "new workflow", "make a workflow for", "workflow builder".
  Does: Scans codebase -> extracts intent (JSON) -> generates YAML -> validates -> saves.
  NOT for: Editing existing workflows or creating non-workflow files.

nodes:
  - id: scan-codebase
    bash: |
      echo "=== Existing Commands ==="
      if [ -d ".archon/commands" ]; then
        find .archon/commands -type f -name "*.md" 2>/dev/null | head -30
      else
        echo "(no .archon/commands/ directory)"
      fi

      echo ""
      echo "=== Existing Workflows ==="
      if [ -d ".archon/workflows" ]; then
        find .archon/workflows -type f \( -name "*.yaml" -o -name "*.yml" \) 2>/dev/null | head -30
      else
        echo "(no .archon/workflows/ directory)"
      fi

      echo ""
      echo "=== Package Info ==="
      if [ -f "package.json" ]; then
        grep -E '"name"|"scripts"' package.json | head -10
      else
        echo "(no package.json)"
      fi

      echo ""
      echo "=== Project Context (CLAUDE.md first 50 lines) ==="
      if [ -f "CLAUDE.md" ]; then
        head -50 CLAUDE.md
      else
        echo "(no CLAUDE.md)"
      fi

  - id: extract-intent
    prompt: |
      You are a workflow design classifier. Given a user's description of what they want
      a workflow to do, extract structured intent.

      ## User's Request
      $ARGUMENTS

      ## Codebase Context
      $scan-codebase.output

      ## Instructions

      Analyze the user's request and the existing codebase to determine:
      1. A kebab-case workflow name (e.g., "lint-and-test", "deploy-staging")
      2. A description following the Archon pattern (Use when / Triggers / Does / NOT for)
      3. Trigger phrases the router should match
      4. A list of proposed nodes with their types and purposes
      5. Whether this should be a simple DAG or include a loop node

      Be specific and concrete. Each proposed node should have a clear type
      (bash, prompt, command, or loop) and a one-line description of what it does.

      For prompt nodes that perform analysis, planning, or decision-making, note that
      they should include knowledge base awareness (the KB index is auto-injected into
      the agent context, so these nodes just need a "check knowledge base" instruction).

      ## Provider Selection

      For each proposed node, consider which provider is the best fit:
      - **claude** — full agentic coding SDK, best for heavy implementation work, premium cost
      - **codex** — OpenAI's agentic SDK, comparable to Claude for code work, premium cost
      - **openrouter** — cloud gateway to 300+ models; use `model: <vendor>/<model>` format; variable cost from free to premium
      - **llamacpp** — local endpoint; zero marginal cost; capability depends on the loaded model

      Include a `proposed_providers` recommendation noting which provider/model each node
      should use and why (e.g., "classify: openrouter/meta-llama/llama-4-scout — cheap
      classification; implement: claude/opus — heavy agentic work").
    model: haiku
    allowed_tools: []
    output_format:
      type: object
      properties:
        workflow_name:
          type: string
        description:
          type: string
        trigger_phrases:
          type: string
        proposed_nodes:
          type: string
        execution_mode:
          type: string
          enum: ["dag", "loop"]
        proposed_providers:
          type: string
      required: [workflow_name, description, trigger_phrases, proposed_nodes, execution_mode, proposed_providers]
    depends_on: [scan-codebase]

  - id: generate-yaml
    model: claude-opus-4-6[1m]
    prompt: |
      You are an Archon workflow author. Generate a complete, valid workflow YAML file
      based on the structured intent provided.

      ## Intent
      - **Name**: $extract-intent.output.workflow_name
      - **Description**: $extract-intent.output.description
      - **Trigger Phrases**: $extract-intent.output.trigger_phrases
      - **Proposed Nodes**: $extract-intent.output.proposed_nodes
      - **Execution Mode**: $extract-intent.output.execution_mode
      - **Proposed Providers**: $extract-intent.output.proposed_providers

      ## Original User Request
      $ARGUMENTS

      ## Archon Workflow YAML Schema Reference

      A workflow YAML file has this structure:

      ```yaml
      name: workflow-name
      description: |
        Use when: ...
        Triggers: ...
        Does: ...
        NOT for: ...

      # Optional top-level settings:
      # provider: claude    (or codex, openrouter, llamacpp)
      # model: sonnet       (or haiku, opus, vendor/model for openrouter, any string for llamacpp)
      # interactive: true   (forces foreground execution in web UI)

      nodes:
        - id: node-id-kebab-case
          # Choose ONE of: prompt, bash, command, loop

          # --- prompt node (AI-executed) ---
          prompt: |
            Instructions for the AI...
          # Optional: model, provider, allowed_tools, denied_tools, output_format, context, idle_timeout

          # --- bash node (shell script, no AI, stdout = $<nodeId>.output) ---
          bash: |
            #!/bin/bash
            set -e
            echo "result"

          # --- command node (references a .archon/commands/ file) ---
          command: command-name

          # --- loop node (iterative AI execution) ---
          loop:
            prompt: |
              Instructions repeated each iteration...
            until: COMPLETION_SIGNAL
            max_iterations: 10
            fresh_context: true  # optional: reset context each iteration

          # Per-node provider and model override:
          provider: claude          # claude | codex | openrouter | llamacpp
          model: sonnet             # provider-specific model identifier

          # Common options for all node types:
          depends_on: [other-node-id]       # DAG edges
          when: "$<other-node>.output == 'value'"  # conditional execution
          trigger_rule: all_success          # all_success | one_success | all_done
          timeout: 120000                    # ms, for bash nodes
      ```

      ## Variable Reference
      - `$ARGUMENTS` — user's input text
      - `$ARTIFACTS_DIR` — pre-created directory for workflow artifacts
      - `$<nodeId>.output` — stdout from a bash node or AI response from a prompt node
      - `$<nodeId>.output.field` — JSON field from a node with output_format
      - `$BASE_BRANCH` — base git branch

      ## Provider Capability Profiles

      Four providers are available. Each node can set `provider:` and `model:` independently:

      | Provider | Model Format | Cost | Best For |
      |----------|-------------|------|----------|
      | `claude` | `sonnet`, `opus`, `haiku`, `claude-*` | Premium | Heavy agentic coding, complex implementation |
      | `codex` | OpenAI model IDs | Premium | Code generation, comparable to Claude |
      | `openrouter` | `vendor/model` (e.g., `meta-llama/llama-4-scout`) | Variable | Access to 300+ models, cost optimization |
      | `llamacpp` | Any string (model loaded server-side) | Zero | Local inference, privacy, zero marginal cost |

      All features (`allowed_tools`, `denied_tools`, `hooks`, `mcp`, `skills`, `output_format`,
      `systemPrompt`) work identically on all four providers. No provider-specific restrictions.

      ### Per-Node Provider Examples

      Example mixing providers in a single workflow:
      - Node `classify` with `provider: openrouter`, `model: meta-llama/llama-4-scout` — cheap classification
      - Node `gather-ctx` with `bash:` — deterministic context gathering (no AI, no provider needed)
      - Node `implement` with `provider: claude`, `model: opus` — heavy agentic coding
      - Node `local-review` with `provider: llamacpp`, `allowed_tools: []` — local model review

      ### Bash-Decomposition Heuristic

      When a node targets a weaker provider (typically small local Llama.cpp models or
      inexpensive OpenRouter models), prefer splitting tool-heavy work into a preceding
      `bash:` node that gathers context via deterministic shell commands, then feeds the
      output into a `prompt:` node that only needs to reason over the gathered text. This
      avoids forcing a weak model to emit well-formed tool calls.

      ## Knowledge Base Integration

      Generated workflows should leverage the project knowledge base when relevant.
      The `$KNOWLEDGE` variable is substituted at execution time with formatted knowledge
      base content (global and project indexes plus unprocessed logs). When no knowledge
      exists, it resolves to an empty string.

      For prompt nodes that perform analysis, planning, or decision-making, include a
      "Knowledge Base" section like this:

      ```
      ## Knowledge Base

      $KNOWLEDGE
      ```

      Guidelines:
      - Add `$KNOWLEDGE` references to nodes that benefit from historical context (analysis,
        planning, architecture, refactoring) — not to simple bash or classification nodes
      - `$KNOWLEDGE` gracefully degrades — it resolves to empty string when no KB exists,
        so workflows work fine with or without a knowledge base
      - Place `$KNOWLEDGE` under a `## Knowledge Base` heading for consistency

      ## Rules
      1. The `name:` field MUST match: $extract-intent.output.workflow_name
      2. The `description:` MUST follow the "Use when / Triggers / Does / NOT for" pattern
      3. Every node MUST have a unique kebab-case `id`
      4. Use `depends_on` to define execution order
      5. Use `bash` nodes for deterministic operations (file checks, git commands, installs)
      6. Use `prompt` nodes for AI reasoning tasks
      7. Use `output_format` on prompt nodes when downstream nodes need structured data
      8. Use `allowed_tools: []` on classification/analysis nodes that don't need tools
      9. Use `denied_tools: [Edit, Bash]` when a node should only use Write (not edit existing files)
      10. Prefer `model: haiku` for simple classification tasks to save cost
      11. Add a "Knowledge Base" section to prompt nodes that perform analysis, planning, or
          decision-making — use "if available" phrasing for graceful degradation
      12. All features (`allowed_tools`, `denied_tools`, `hooks`, `mcp`, `skills`, `output_format`,
          `systemPrompt`) work identically on all four providers — no provider-specific restrictions
      13. When targeting weaker providers (small local models, inexpensive OpenRouter models),
          split tool-heavy work into a `bash:` node for context gathering + a `prompt:` node for
          reasoning — this avoids forcing weak models to emit well-formed tool calls
      14. Use per-node `provider:` and `model:` to mix providers within a workflow — e.g.,
          cheap classification on openrouter, heavy implementation on claude

      ## Output

      Write the complete workflow YAML to: `$ARTIFACTS_DIR/generated-workflow.yaml`

      Use the Write tool. Do NOT use Edit or Bash. The file must be valid YAML and follow
      all the patterns above.
    denied_tools: [Edit, Bash]
    depends_on: [extract-intent]

  - id: validate-yaml
    model: haiku
    bash: |
      FILE="$ARTIFACTS_DIR/generated-workflow.yaml"

      if [ ! -f "$FILE" ]; then
        echo "ERROR: generated-workflow.yaml not found at $FILE"
        exit 1
      fi

      if [ ! -s "$FILE" ]; then
        echo "ERROR: generated-workflow.yaml is empty"
        exit 1
      fi

      if ! grep -q "^name:" "$FILE"; then
        echo "ERROR: missing 'name:' field"
        exit 1
      fi

      if ! grep -q "^nodes:" "$FILE"; then
        echo "ERROR: missing 'nodes:' field"
        exit 1
      fi

      echo "VALID"
    depends_on: [generate-yaml]

  - id: save-or-report
    model: haiku
    prompt: |
      You are a workflow installer. Save the generated workflow and report to the user.

      ## Workflow Details
      - **Name**: $extract-intent.output.workflow_name
      - **Trigger Phrases**: $extract-intent.output.trigger_phrases

      ## Instructions

      1. Read the generated workflow from `$ARTIFACTS_DIR/generated-workflow.yaml`
      2. Create the directory `.archon/workflows/` if it doesn't exist (use Bash: `mkdir -p .archon/workflows/`)
      3. Save the workflow to `.archon/workflows/$extract-intent.output.workflow_name.yaml`
         Use the Write tool to write the file.
      4. Report to the user:
         - Workflow name and file location
         - Trigger phrases that will invoke it
         - How to run it: `bun run cli workflow run $extract-intent.output.workflow_name "your input"`
         - How to test it: `bun run cli validate workflows $extract-intent.output.workflow_name`
    depends_on: [validate-yaml]
